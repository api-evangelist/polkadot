apis:
  - name: Subscan API
    description: Subscan provides a hosted HTTP API for querying indexed on-chain data across more than 90 Substrate-based networks including Polkadot and Kusama. Endpoints cover blocks, extrinsics, events, accounts, staking, tokens, and parachain data. Each network has a dedicated base URL following the pattern https://{network}.api.subscan.io. All requests require an API key obtained from pro.subscan.io.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://support.subscan.io/
    baseURL: https://polkadot.api.subscan.io
    tags:
      - Blockchain
      - Polkadot
      - Kusama
      - Extrinsics
      - Events
      - Accounts
      - Blocks
      - Staking
      - Parachain
    properties:
      - type: Documentation
        url: https://support.subscan.io/
      - type: PostmanCollection
        url: https://documenter.getpostman.com/view/1618960/TVCe1oRU
      - type: OpenAPI
        url: https://raw.githubusercontent.com/api-evangelist/polkadot/refs/heads/main/openapi/subscan-swagger.yaml
      - type: Plans
