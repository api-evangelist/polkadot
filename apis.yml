        email: api@subscan.io
  - name: Substrate API Sidecar
    description: The Substrate API Sidecar is an open-source REST service maintained by Parity Technologies that provides a RESTful interface for interacting with Polkadot SDK-based blockchains. It covers blocks, accounts (balances, assets, foreign assets), transactions (dry-run, parse, material), staking, and parachain/coretime data. Parity provides public hosted instances for Polkadot, Kusama, Polkadot Asset Hub, and Kusama Asset Hub. Self-hosting is recommended for production use.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://paritytech.github.io/substrate-api-sidecar/docsv2/
    baseURL: https://polkadot-public-sidecar.parity-chains.parity.io
    tags:
      - Blockchain
      - Polkadot
      - Kusama
      - Accounts
      - Blocks
      - Transactions
      - Staking
      - Parachain
      - Open Source
    properties:
      - type: Documentation
        url: https://docs.polkadot.com/chain-interactions/query-data/query-rest/
      - type: OpenAPI
        url: https://raw.githubusercontent.com/api-evangelist/polkadot/refs/heads/main/openapi/substrate-api-sidecar-openapi.yaml
      - type: GitHubRepository
        url: https://github.com/paritytech/substrate-api-sidecar
    contact:
      - FN: Parity Technologies
        url: https://www.parity.io/
  - name: Polkadot REST API
    description: The Polkadot REST API is a Rust rewrite of the Substrate API Sidecar, maintained by Parity Technologies, offering REST endpoints for blocks, transactions (dry-run, parse, material), accounts, staking, and parachain/coretime data. It targets production deployments requiring high throughput and provides OpenAPI specifications for all endpoints.
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    humanURL: https://github.com/paritytech/polkadot-rest-api
